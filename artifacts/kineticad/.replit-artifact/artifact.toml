kind = "web"
  previewPath = "/app"
  title = "KinetiCAD"
  version = "1.0.0"
  id = "artifacts/kineticad"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/app" ]
  localPort = 25157

  [services.development]
  run = "pnpm --filter @workspace/kineticad run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/kineticad", "run", "build" ]
  run = [ "node", "artifacts/kineticad/serve.mjs" ]

  [services.env]
  PORT = "25157"
  BASE_PATH = "/app"
