kind = "web"
previewPath = "/kineticad-intro/"
title = "KinetiCAD Intro"
version = "1.0.0"
id = "artifacts/kineticad-intro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/kineticad-intro/" ]
localPort = 21262

[services.development]
run = "pnpm --filter @workspace/kineticad-intro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/kineticad-intro", "run", "build" ]
publicDir = "artifacts/kineticad-intro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21262"
BASE_PATH = "/kineticad-intro/"
